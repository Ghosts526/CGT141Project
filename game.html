<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Operation Breakpoint: Game</title>
    <link rel="stylesheet" href="css/game.css">
    <script type="module" src="js/GameArea.js" defer></script>
    <script type="module" src="js/Bullet.js" defer></script>
    <script type="module" src="js/Player.js" defer></script>
    <script type="module" src="js/Enemy.js" defer></script>
    <script type="module" src="js/WaveSystem.js" defer></script>
    <script type="module" src="js/Collision.js" defer></script>
    <script type="module" src="js/Game.js" defer></script>
</head>
<body>
    <header>
        <h1 class="visually-hidden">Game Screen</h1>
    </header>

    <main>
        <canvas id="gameScreen"></canvas>
        <div class="UI-Buttons">
            <button class="MyButton" id="menuButton" onclick="mainMenu()" type="button">Main Menu</button>
            <button class="MyButton" id="gameButton" onclick="startGame()" type="button">Start Game</button>
            <button class="MyButton" id="pauseButton" onclick="pauseGame()" type="button">Pause Game</button>
        </div>
        <div class="UI-Display">
            <div id="score">Score: 0</div>
        </div>
    </main>
</body>
</html>
