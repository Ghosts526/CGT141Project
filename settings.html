<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Operation Breakpoint: Settings</title>
    <link rel="stylesheet" href="css/master.css">
    <script src="js/Script.js" defer></script>
    <script src="js/Settings.js" defer></script>
</head>
<body>
    <header>
        <h1>Settings</h1>
    </header>

    <main>
        <a href="gameMenu.html" class="button" id="backButton">Back</a>
        <section>
            <button class="button" id="clearButton" onclick="clearData()" type="button">Clear Data</button>
            <button class="button" id="printButton" onclick="printData()" type="button">Print Data</button>
            <button class="button" id="addMoneyButton" onclick="addMoney(9999)" type="button">Add 9999 Credits</button>
            <button class="button" id="showCollisionBox" onclick="showCollisionBox()" type="button">Show Collision Box [Off]</button>
            <button class="button" id="godMode" onclick="godMode()" type="button">God Mode [Off]</button>
        </section>
    </main>
</body>
</html>
